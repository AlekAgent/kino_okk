<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINO.OK — Смотри кино онлайн</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <div class="logo" onclick="go('home')">KINO<span>.</span>OK</div>
    <ul class="nav-links">
      <li><a id="nl-home"    onclick="go('home')">Главная</a></li>
      <li><a id="nl-catalog" onclick="go('catalog')">Каталог</a></li>
      <li><a id="nl-search"  onclick="go('search')">Поиск</a></li>
    </ul>
    <div class="nav-right">
      <div class="nav-search">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="Найти фильм…"
               id="nb-search" oninput="navSearch(this.value)" autocomplete="off">
      </div>
      <button class="icon-btn" onclick="go('favorites')" title="Избранное" id="fav-icon">♡</button>
      <div id="auth-area"></div>
    </div>
  </nav>

  <!-- ── APP ROOT ───────────────────────────────────────────── -->
  <div id="app"></div>

  <!-- ── TOASTS ─────────────────────────────────────────────── -->
  <div class="toasts" id="toasts"></div>

  <!-- ── SCRIPT ─────────────────────────────────────────────── -->
  <script src="main.js"></script>

</body>
</html>
